<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Health Transform — Onboarding</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --bg-primary: #07070F;
    --bg-secondary: #0C0C1A;
    --bg-tertiary: #161626;
    --bg-card: rgba(12,12,26,0.92);
    --bg-card-solid: #0F0F1E;
    --text-primary: #EEEEF8;
    --text-secondary: #6E6E9A;
    --text-tertiary: #42425A;
    --separator: rgba(255,255,255,0.07);
    --border: rgba(255,255,255,0.07);
    --blue: #3B82FF;
    --green: #00C896;
    --red: #FF3B30;
    --purple: #A855F7;
    --orange: #F97316;
    --pink: #EC4899;
    --teal: #14B8A6;
    --yellow: #EAB308;
    --card-pad: 16px;
    --card-radius: 16px;
    --radius: 16px;
    --radius-sm: 12px;
    --radius-xs: 8px;
    --font-display: 'Barlow Condensed', -apple-system, system-ui, sans-serif;
    --font-mono: 'DM Mono', ui-monospace, monospace;
    --font-body: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg-primary);
    font-family: var(--font-body);
    color: var(--text-primary);
    overflow: hidden;
  }

  #root { width: 100%; height: 100%; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 0; background: transparent; }

  /* Keyframes */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes slideInRight {
    from { opacity: 0; transform: translateX(40px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes slideInLeft {
    from { opacity: 0; transform: translateX(-40px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.88); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.7; transform: scale(0.96); }
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  @keyframes orbit {
    from { transform: rotate(0deg) translateX(52px) rotate(0deg); }
    to { transform: rotate(360deg) translateX(52px) rotate(-360deg); }
  }
  @keyframes orbitReverse {
    from { transform: rotate(0deg) translateX(40px) rotate(0deg); }
    to { transform: rotate(-360deg) translateX(40px) rotate(360deg); }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
  }
  @keyframes ringFill {
    from { stroke-dashoffset: 283; }
  }
  @keyframes counterUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes glow {
    0%, 100% { box-shadow: 0 0 20px rgba(59,130,255,0.3); }
    50% { box-shadow: 0 0 40px rgba(59,130,255,0.6), 0 0 80px rgba(59,130,255,0.2); }
  }
  @keyframes checkPop {
    0% { transform: scale(0) rotate(-10deg); opacity: 0; }
    60% { transform: scale(1.2) rotate(5deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  @keyframes progressFill {
    from { width: 0%; }
  }
  @keyframes starBurst {
    0% { transform: scale(0) rotate(0deg); opacity: 1; }
    100% { transform: scale(2) rotate(180deg); opacity: 0; }
  }
  @keyframes bgFloat1 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, -20px) scale(1.05); }
    66% { transform: translate(-20px, 15px) scale(0.95); }
  }
  @keyframes bgFloat2 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(-25px, 20px) scale(1.08); }
    66% { transform: translate(20px, -15px) scale(0.92); }
  }
  @keyframes bgFloat3 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(15px, 25px) scale(1.03); }
  }
  @keyframes typewriter {
    from { width: 0; }
    to { width: 100%; }
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
  @keyframes ribbonSlide {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── ICONS ───────────────────────────────────────────────────────────────────
const Icon = ({ name, size = 20, color = 'currentColor', style = {} }) => {

    star: <svg width={size} height={size} viewBox="0 0 24 24" fill={color} stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
    dumbbell: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 5v14M18 5v14M6 9h12M6 15h12M3 7h3M3 17h3M18 7h3M18 17h3"/></svg>,
    bolt: <svg width={size} height={size} viewBox="0 0 24 24" fill={color} stroke="none"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
    ai: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>,
    chart: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>,
    shield: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
    trophy: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16M9 22v-4.5a3 3 0 0 0-3-3H6M15 22v-4.5a3 3 0 0 1 3-3H18M8 2h8v7a4 4 0 0 1-4 4 4 4 0 0 1-4-4V2z"/></svg>,
    food: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>,
    camera: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>,
    lock: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
    gym: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>,
    info: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,
    close: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
    plus: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
    sparkle: <svg width={size} height={size} viewBox="0 0 24 24" fill={color} stroke="none"><path d="M12 3l1.5 5.5L19 10l-5.5 1.5L12 17l-1.5-5.5L5 10l5.5-1.5L12 3z"/><path d="M5 3l.75 2.75L8.5 6.5l-2.75.75L5 10l-.75-2.75L1.5 6.5l2.75-.75L5 3z" opacity="0.5"/><path d="M19 17l.75 2.75 2.75.75-2.75.75L19 24l-.75-2.75-2.75-.75 2.75-.75L19 17z" opacity="0.5"/></svg>,
  };
  return <span style={{ display: 'inline-flex', alignItems: 'center', ...style }}>{icons[name] || null}</span>;
};

// ─── ANIMATED BG ─────────────────────────────────────────────────────────────
const AnimatedBackground = ({ variant = 'default' }) => {
  const configs = {
    default: { c1: '#3B82FF', c2: '#A855F7', c3: '#00C896' },
    goals:   { c1: '#F97316', c2: '#EC4899', c3: '#3B82FF' },
    gym:     { c1: '#3B82FF', c2: '#00C896', c3: '#EAB308' },
    stats:   { c1: '#A855F7', c2: '#3B82FF', c3: '#14B8A6' },
    final:   { c1: '#00C896', c2: '#3B82FF', c3: '#A855F7' },
  };
  const { c1, c2, c3 } = configs[variant] || configs.default;
  return (
    <div style={{ position: 'absolute', inset: 0, overflow: 'hidden', pointerEvents: 'none' }}>
      <div style={{
        position: 'absolute', width: 400, height: 400, borderRadius: '50%',
        background: `radial-gradient(circle, ${c1}18 0%, transparent 70%)`,
        top: '-100px', left: '-100px',
        animation: 'bgFloat1 8s ease-in-out infinite',
      }} />
      <div style={{
        position: 'absolute', width: 350, height: 350, borderRadius: '50%',
        background: `radial-gradient(circle, ${c2}14 0%, transparent 70%)`,
        top: '30%', right: '-80px',
        animation: 'bgFloat2 10s ease-in-out infinite',
      }} />
      <div style={{
        position: 'absolute', width: 300, height: 300, borderRadius: '50%',
        background: `radial-gradient(circle, ${c3}10 0%, transparent 70%)`,
        bottom: '-50px', left: '20%',
        animation: 'bgFloat3 12s ease-in-out infinite',
      }} />
      <div style={{
        position: 'absolute', inset: 0,
        background: 'radial-gradient(ellipse 80% 60% at 50% 0%, rgba(59,130,255,0.06) 0%, transparent 60%)',
      }} />
    </div>
  );
};

// ─── PROGRESS BAR ────────────────────────────────────────────────────────────
const ProgressBar = ({ current, total }) => {
  return (
    <div style={{ display: 'flex', gap: 4, padding: '0 4px' }}>
      {Array.from({ length: total }).map((_, i) => (
        <div key={i} style={{
          flex: 1, height: 3, borderRadius: 2,
          background: i < current ? 'var(--blue)' : 'var(--separator)',
          transition: 'background 0.4s ease',
          overflow: 'hidden',
        }}>
          {i === current - 1 && (
            <div style={{
              height: '100%', width: '100%',
              background: 'linear-gradient(90deg, var(--blue), rgba(168,85,247,0.8))',
              animation: 'progressFill 0.6s ease forwards',
            }} />
          )}
        </div>
      ))}
    </div>
  );
};

// ─── PILL CHIP ────────────────────────────────────────────────────────────────
const Chip = ({ label, selected, onClick, color = 'var(--blue)' }) => {
  const [pressed, setPressed] = useState(false);
  return (
    <button
      onMouseDown={() => setPressed(true)}
      onMouseUp={() => setPressed(false)}
      onTouchStart={() => setPressed(true)}
      onTouchEnd={() => setPressed(false)}
      onClick={onClick}
      style={{
        padding: '10px 16px',
        borderRadius: 20,
        border: selected ? `1.5px solid ${color}` : '1.5px solid var(--border)',
        background: selected ? `${color}22` : 'var(--bg-tertiary)',
        color: selected ? color : 'var(--text-secondary)',
        fontSize: 14,
        fontWeight: selected ? 600 : 400,
        fontFamily: 'var(--font-body)',
        cursor: 'pointer',
        transition: 'all 0.2s ease',
        transform: pressed ? 'scale(0.94)' : 'scale(1)',
        letterSpacing: '0.01em',
        minHeight: 44,
        display: 'flex', alignItems: 'center', gap: 6,
      }}
    >
      {selected && <Icon name="check" size={12} color={color} />}
      {label}
    </button>
  );
};

// ─── DRUM PICKER ─────────────────────────────────────────────────────────────
const ITEM_H = 48; // px per row

const DrumPicker = ({ label, value, onChange, min, max, unit }) => {
  const count = max - min + 1;
  const listRef = useRef(null);
  const isDragging = useRef(false);
  const startY = useRef(0);
  const startScroll = useRef(0);
  const animRef = useRef(null);
  const velocityRef = useRef(0);
  const lastY = useRef(0);
  const lastTime = useRef(0);

  // Scroll to value on mount / external change
  useEffect(() => {
    const el = listRef.current;
    if (!el) return;
    const idx = Number(value) - min;
    const target = idx * ITEM_H;
    if (Math.abs(el.scrollTop - target) > 2) {
      el.scrollTop = target;
    }
  }, [value, min]);

  const snapToNearest = (el) => {
    const idx = Math.round(el.scrollTop / ITEM_H);
    const clamped = Math.max(0, Math.min(count - 1, idx));
    const target = clamped * ITEM_H;
    smoothScrollTo(el, target, () => {
      onChange(String(min + clamped));
    });
  };

  const smoothScrollTo = (el, target, cb) => {
    if (animRef.current) cancelAnimationFrame(animRef.current);
    const start = el.scrollTop;
    const dist = target - start;
    const duration = Math.min(300, Math.max(120, Math.abs(dist) * 1.2));
    const t0 = performance.now();
    const step = (now) => {
      const elapsed = now - t0;
      const progress = Math.min(1, elapsed / duration);
      // ease-out cubic
      const ease = 1 - Math.pow(1 - progress, 3);
      el.scrollTop = start + dist * ease;
      if (progress < 1) {
        animRef.current = requestAnimationFrame(step);
      } else {
        el.scrollTop = target;
        cb && cb();
      }
    };
    animRef.current = requestAnimationFrame(step);
  };

  // Momentum fling
  const fling = (el, velocity) => {
    if (animRef.current) cancelAnimationFrame(animRef.current);
    const step = () => {
      velocity *= 0.88;
      el.scrollTop += velocity;
      if (Math.abs(velocity) > 0.5) {
        animRef.current = requestAnimationFrame(step);
      } else {
        snapToNearest(el);
      }
    };
    animRef.current = requestAnimationFrame(step);
  };

  // Touch handlers
  const onTouchStart = (e) => {
    if (animRef.current) cancelAnimationFrame(animRef.current);
    isDragging.current = true;
    startY.current = e.touches[0].clientY;
    startScroll.current = listRef.current.scrollTop;
    lastY.current = e.touches[0].clientY;
    lastTime.current = performance.now();
    velocityRef.current = 0;
  };

  const onTouchMove = (e) => {
    if (!isDragging.current) return;
    e.preventDefault();
    const dy = startY.current - e.touches[0].clientY;
    listRef.current.scrollTop = startScroll.current + dy;
    const now = performance.now();
    const dt = now - lastTime.current;
    if (dt > 0) {
      velocityRef.current = (lastY.current - e.touches[0].clientY) / dt * 16;
    }
    lastY.current = e.touches[0].clientY;
    lastTime.current = now;
  };

  const onTouchEnd = () => {
    isDragging.current = false;
    const v = velocityRef.current;
    if (Math.abs(v) > 1.5) {
      fling(listRef.current, v);
    } else {
      snapToNearest(listRef.current);
    }
  };

  // Mouse drag
  const onMouseDown = (e) => {
    if (animRef.current) cancelAnimationFrame(animRef.current);
    isDragging.current = true;
    startY.current = e.clientY;
    startScroll.current = listRef.current.scrollTop;
    lastY.current = e.clientY;
    lastTime.current = performance.now();
    velocityRef.current = 0;
    e.preventDefault();
  };

  useEffect(() => {
    const onMouseMove = (e) => {
      if (!isDragging.current) return;
      const dy = startY.current - e.clientY;
      listRef.current.scrollTop = startScroll.current + dy;
      const now = performance.now();
      const dt = now - lastTime.current;
      if (dt > 0) velocityRef.current = (lastY.current - e.clientY) / dt * 16;
      lastY.current = e.clientY;
      lastTime.current = now;
    };
    const onMouseUp = () => {
      if (!isDragging.current) return;
      isDragging.current = false;
      const v = velocityRef.current;
      if (Math.abs(v) > 1.5) {
        fling(listRef.current, v);
      } else {
        snapToNearest(listRef.current);
      }
    };
    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('mouseup', onMouseUp);
    return () => {
      window.removeEventListener('mousemove', onMouseMove);
      window.removeEventListener('mouseup', onMouseUp);
    };
  }, []);

  // Scroll wheel
  const onWheel = (e) => {
    e.preventDefault();
    if (animRef.current) cancelAnimationFrame(animRef.current);
    listRef.current.scrollTop += e.deltaY * 0.5;
    clearTimeout(listRef.current._wheelTimer);
    listRef.current._wheelTimer = setTimeout(() => snapToNearest(listRef.current), 120);
  };

  const [scrollVal, setScrollVal] = useState(Number(value) || min);

  // Sync scrollVal with external value changes
  useEffect(() => {
    setScrollVal(Number(value) || min);
  }, [value, min]);

  // Keep scrollVal in sync with scroll position for visual updates
  useEffect(() => {
    const el = listRef.current;
    if (!el) return;
    const onScroll = () => {
      const idx = Math.round(el.scrollTop / ITEM_H);
      setScrollVal(min + Math.max(0, Math.min(count - 1, idx)));
    };
    el.addEventListener('scroll', onScroll, { passive: true });
    return () => el.removeEventListener('scroll', onScroll);
  }, [min, count]);

  const currentIdx = scrollVal - min;

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 8, userSelect: 'none' }}>
      <label style={{
        fontSize: 11, fontWeight: 700, letterSpacing: '0.08em',
        textTransform: 'uppercase', color: 'var(--text-tertiary)',
      }}>{label}</label>

      <div style={{
        position: 'relative',
        background: 'var(--bg-tertiary)',
        border: '1.5px solid var(--border)',
        borderRadius: 'var(--radius-sm)',
        height: ITEM_H * 3,
        overflow: 'hidden',
        cursor: 'grab',
      }}>
        {/* Top fade */}
        <div style={{
          position: 'absolute', top: 0, left: 0, right: 0, height: ITEM_H,
          background: 'linear-gradient(to bottom, var(--bg-tertiary) 20%, transparent 100%)',
          zIndex: 2, pointerEvents: 'none',
        }} />
        {/* Bottom fade */}
        <div style={{
          position: 'absolute', bottom: 0, left: 0, right: 0, height: ITEM_H,
          background: 'linear-gradient(to top, var(--bg-tertiary) 20%, transparent 100%)',
          zIndex: 2, pointerEvents: 'none',
        }} />
        {/* Selection band */}
        <div style={{
          position: 'absolute', top: ITEM_H, left: 0, right: 0, height: ITEM_H,
          border: '1.5px solid rgba(59,130,255,0.45)',
          borderLeft: 'none', borderRight: 'none',
          background: 'rgba(59,130,255,0.07)',
          zIndex: 1, pointerEvents: 'none',
        }} />

        {/* Scrollable list */}
        <div
          ref={listRef}
          onTouchStart={onTouchStart}
          onTouchMove={onTouchMove}
          onTouchEnd={onTouchEnd}
          onMouseDown={onMouseDown}
          onWheel={onWheel}
          style={{
            position: 'absolute', inset: 0,
            overflowY: 'scroll',
            scrollbarWidth: 'none',
            WebkitOverflowScrolling: 'touch',
          }}
        >
          {/* Padding spacers */}
          <div style={{ height: ITEM_H }} />
          {Array.from({ length: count }, (_, i) => {
            const val = min + i;
            const dist = Math.abs(val - (min + currentIdx));
            const opacity = dist === 0 ? 1 : dist === 1 ? 0.5 : 0.2;
            const scale = dist === 0 ? 1 : dist === 1 ? 0.88 : 0.76;
            return (
              <div
                key={val}
                style={{
                  height: ITEM_H,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  gap: 6,
                }}
              >
                <span style={{
                  fontFamily: 'var(--font-display)',
                  fontSize: dist === 0 ? 26 : 20,
                  fontWeight: dist === 0 ? 800 : 500,
                  color: dist === 0 ? 'var(--text-primary)' : 'var(--text-secondary)',
                  opacity,
                  transform: `scale(${scale})`,
                  display: 'inline-block',
                  transition: 'all 0.15s ease',
                  letterSpacing: '0.01em',
                }}>{val}</span>
                {dist === 0 && unit && (
                  <span style={{
                    fontSize: 13, fontWeight: 600,
                    color: 'var(--blue)', opacity: 0.8,
                    fontFamily: 'var(--font-body)',
                  }}>{unit}</span>
                )}
              </div>
            );
          })}
          <div style={{ height: ITEM_H }} />
        </div>
      </div>
    </div>
  );
};

// ─── BTN ─────────────────────────────────────────────────────────────────────
const Btn = ({ children, onClick, variant = 'primary', disabled = false, fullWidth = true, icon, loading = false }) => {
  const [pressed, setPressed] = useState(false);
  const variants = {
    primary: {
      background: 'linear-gradient(135deg, #3B82FF 0%, #6366F1 100%)',
      color: '#fff',
      border: 'none',
      boxShadow: pressed ? '0 4px 20px rgba(59,130,255,0.3)' : '0 8px 32px rgba(59,130,255,0.35)',
    },
    success: {
      background: 'linear-gradient(135deg, #00C896 0%, #0EA472 100%)',
      color: '#fff',
      border: 'none',
      boxShadow: pressed ? '0 4px 20px rgba(0,200,150,0.3)' : '0 8px 32px rgba(0,200,150,0.35)',
    },
    ghost: {
      background: 'transparent',
      color: 'var(--text-secondary)',
      border: '1.5px solid var(--border)',
      boxShadow: 'none',
    },
  };
  const v = variants[variant] || variants.primary;
  return (
    <button
      disabled={disabled || loading}
      onMouseDown={() => setPressed(true)}
      onMouseUp={() => setPressed(false)}
      onTouchStart={() => setPressed(true)}
      onTouchEnd={() => setPressed(false)}
      onClick={onClick}
      style={{
        width: fullWidth ? '100%' : 'auto',
        padding: '16px 24px',
        borderRadius: 14,
        fontSize: 16,
        fontWeight: 700,
        fontFamily: 'var(--font-body)',
        cursor: disabled ? 'not-allowed' : 'pointer',
        opacity: disabled ? 0.4 : 1,
        transform: pressed ? 'scale(0.97)' : 'scale(1)',
        transition: 'all 0.15s ease',
        display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
        letterSpacing: '0.01em',
        ...v,
      }}
    >
      {loading ? (
        <div style={{
          width: 20, height: 20, borderRadius: '50%',
          border: '2.5px solid rgba(255,255,255,0.3)',
          borderTopColor: '#fff',
          animation: 'spin 0.6s linear infinite',
        }} />
      ) : <>
        {icon && <Icon name={icon} size={18} color="currentColor" />}
        {children}
        {variant === 'primary' && !icon && <Icon name="arrow" size={16} color="rgba(255,255,255,0.7)" />}
      </>}
    </button>
  );
};

  ];
  const equipment = [
    { value: 'full_gym', label: 'Full Gym', icon: 'dumbbell' },
    { value: 'dumbbells_only', label: 'Dumbbells', icon: 'dumbbell' },
    { value: 'home_basic', label: 'Home Basic', icon: 'gym' },
    { value: 'bodyweight', label: 'Bodyweight', icon: 'posture' },
  ];
  const scheduleTypes = [
    { value: 'specific_days', label: 'Specific Days' },
    { value: 'every_n_days', label: 'Every N Days' },
    { value: 'daily', label: 'Every Day' },
  ];
  const days = ['M', 'T', 'W', 'T', 'F', 'S', 'S'];
  const dayLabels = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];

  const toggleDay = (i) => {
    const curr = data.gym_specific_days || [0,2,4];
    const next = curr.includes(i) ? curr.filter(d => d !== i) : [...curr, i];
    onChange('gym_specific_days', next);
  };

  const canContinue = data.experience_level && data.available_equipment && data.gym_schedule_type;

  return (
    <div style={{ padding: '0 24px 32px', animation: 'slideInRight 0.4s ease both', position: 'relative' }}>
      <AnimatedBackground variant="gym" />
      <div style={{ position: 'relative', zIndex: 1 }}>
        <div style={{ marginBottom: 24 }}>
          <p style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', color: 'var(--green)', marginBottom: 6, fontFamily: 'var(--font-mono)' }}>Step 3 of 6</p>
          <h2 style={{ fontFamily: 'var(--font-display)', fontSize: 36, fontWeight: 800, letterSpacing: '-0.01em', lineHeight: 1.1 }}>Gym Setup</h2>
          <p style={{ color: 'var(--text-secondary)', marginTop: 6, fontSize: 14 }}>We'll build a program that fits your reality</p>
        </div>

        {/* Experience */}
        <div style={{ marginBottom: 22 }}>
          <label style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--text-tertiary)', display: 'block', marginBottom: 10 }}>Experience Level</label>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {levels.map(l => (
              <button
                key={l.value}
                onClick={() => onChange('experience_level', l.value)}
                style={{
                  display: 'flex', alignItems: 'center', padding: '12px 16px', borderRadius: 12,
                  border: data.experience_level === l.value ? `1.5px solid ${l.color}` : '1.5px solid var(--border)',
                  background: data.experience_level === l.value ? `${l.color}18` : 'var(--bg-tertiary)',
                  cursor: 'pointer', transition: 'all 0.2s', gap: 12,
                }}
              >
                <div style={{ width: 8, height: 8, borderRadius: '50%', background: l.color, boxShadow: data.experience_level === l.value ? `0 0 8px ${l.color}` : 'none', transition: 'all 0.2s' }} />
                <span style={{ fontWeight: 600, color: data.experience_level === l.value ? 'var(--text-primary)' : 'var(--text-secondary)', fontSize: 15 }}>{l.label}</span>
                <span style={{ fontSize: 12, color: 'var(--text-tertiary)', marginLeft: 4 }}>{l.sub}</span>
                {data.experience_level === l.value && <Icon name="check" size={14} color={l.color} style={{ marginLeft: 'auto' }} />}
              </button>
            ))}
          </div>
        </div>

        {/* Schedule type */}
        <div style={{ marginBottom: 18 }}>
          <label style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--text-tertiary)', display: 'block', marginBottom: 10 }}>Training Schedule</label>
          <div style={{ display: 'flex', gap: 8 }}>
            {scheduleTypes.map(s => (
              <button
                key={s.value}
                onClick={() => onChange('gym_schedule_type', s.value)}
                style={{
                  flex: 1, padding: '10px 8px', borderRadius: 10, fontSize: 12, fontWeight: 600,
                  border: data.gym_schedule_type === s.value ? '1.5px solid var(--blue)' : '1.5px solid var(--border)',
                  background: data.gym_schedule_type === s.value ? 'rgba(59,130,255,0.15)' : 'var(--bg-tertiary)',
                  color: data.gym_schedule_type === s.value ? 'var(--blue)' : 'var(--text-secondary)',
                  cursor: 'pointer', transition: 'all 0.2s',
                  textAlign: 'center', lineHeight: 1.3,
                }}
              >{s.label}</button>
            ))}
          </div>
        </div>

        {/* Day picker */}
        {data.gym_schedule_type === 'specific_days' && (
          <div style={{ marginBottom: 18, animation: 'fadeIn 0.3s ease' }}>
            <label style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--text-tertiary)', display: 'block', marginBottom: 10 }}>Which Days?</label>
            <div style={{ display: 'flex', gap: 6 }}>
              {days.map((d, i) => {
                const isSelected = (data.gym_specific_days || [0,2,4]).includes(i);
                return (
                  <button
                    key={i}
                    onClick={() => toggleDay(i)}
                    style={{
                      flex: 1, aspectRatio: '1', borderRadius: 10, fontSize: 11, fontWeight: 700,
                      border: isSelected ? '1.5px solid var(--blue)' : '1.5px solid var(--border)',
                      background: isSelected ? 'var(--blue)' : 'var(--bg-tertiary)',
                      color: isSelected ? '#fff' : 'var(--text-secondary)',
                      cursor: 'pointer', transition: 'all 0.2s',
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                      minHeight: 40,
                    }}
                  >{d}</button>
                );
              })}
            </div>
          </div>
        )}

        {/* Every N days */}
        {data.gym_schedule_type === 'every_n_days' && (
          <div style={{ marginBottom: 18, animation: 'fadeIn 0.3s ease' }}>
            <label style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--text-tertiary)', display: 'block', marginBottom: 10 }}>Frequency</label>
            <div style={{ display: 'flex', gap: 8 }}>
              {[1,2,3].map(n => (
                <button
                  key={n}
                  onClick={() => onChange('gym_every_n_days', n)}
                  style={{
                    flex: 1, padding: '12px', borderRadius: 10, fontSize: 14, fontWeight: 600,
                    border: data.gym_every_n_days === n ? '1.5px solid var(--blue)' : '1.5px solid var(--border)',
                    background: data.gym_every_n_days === n ? 'rgba(59,130,255,0.15)' : 'var(--bg-tertiary)',
                    color: data.gym_every_n_days === n ? 'var(--blue)' : 'var(--text-secondary)',
                    cursor: 'pointer', transition: 'all 0.2s',
                  }}
                >Every {n === 1 ? 'Day' : `${n} Days`}</button>
              ))}
            </div>
          </div>
        )}

        {/* Equipment */}
        <div style={{ marginBottom: 24 }}>
          <label style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--text-tertiary)', display: 'block', marginBottom: 10 }}>Equipment</label>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
            {equipment.map(e => (
              <button
                key={e.value}
                onClick={() => onChange('available_equipment', e.value)}
                style={{
                  padding: '12px', borderRadius: 12, fontSize: 13, fontWeight: 600,
                  border: data.available_equipment === e.value ? '1.5px solid var(--green)' : '1.5px solid var(--border)',
                  background: data.available_equipment === e.value ? 'rgba(0,200,150,0.12)' : 'var(--bg-tertiary)',
                  color: data.available_equipment === e.value ? 'var(--green)' : 'var(--text-secondary)',
                  cursor: 'pointer', transition: 'all 0.2s',
                  display: 'flex', alignItems: 'center', gap: 8,
                }}
              >
                <Icon name={e.icon} size={16} color={data.available_equipment === e.value ? 'var(--green)' : 'var(--text-tertiary)'} />
                {e.label}
              </button>
            ))}
          </div>
        </div>

        {/* Injuries */}
        <div style={{ marginBottom: 28 }}>
          <label style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--text-tertiary)', display: 'block', marginBottom: 8 }}>Injuries / Limitations <span style={{ fontSize: 10, fontWeight: 400, textTransform: 'none', letterSpacing: 0 }}>(optional)</span></label>
          <textarea
            value={data.injuries || ''}
            onChange={e => onChange('injuries', e.target.value)}
            placeholder="e.g. bad knee, shoulder pain"
            rows={2}
            style={{
              width: '100%', background: 'var(--bg-tertiary)', border: '1.5px solid var(--border)',
              borderRadius: 12, padding: '12px 14px', color: 'var(--text-primary)', fontSize: 14,
              fontFamily: 'var(--font-body)', outline: 'none', resize: 'none',
              transition: 'border-color 0.2s',
            }}
            onFocus={e => e.target.style.borderColor = 'var(--blue)'}
            onBlur={e => e.target.style.borderColor = 'var(--border)'}
          />
        </div>

        <Btn onClick={onNext} disabled={!canContinue}>Continue</Btn>
        <button onClick={onBack} style={{ width: '100%', marginTop: 10, padding: 12, background: 'none', border: 'none', color: 'var(--text-tertiary)', fontSize: 14, cursor: 'pointer' }}>← Back</button>
      </div>
    </div>
  );
};

// ─── STEP 4: MUSCLE SPLIT ─────────────────────────────────────────────────────
const StepMuscles = ({ data, onChange, onNext, onBack }) => {
  const muscles = ['Chest', 'Back', 'Legs', 'Shoulders', 'Biceps', 'Triceps', 'Abs', 'Neck', 'Forearms', 'Rear Delts', 'Calves'];
  const muscleColors = {
    Chest: '#3B82FF', Back: '#00C896', Legs: '#F97316', Shoulders: '#A855F7',
    Biceps: '#EC4899', Triceps: '#14B8A6', Abs: '#EAB308', Neck: '#FF3B30',
    Forearms: '#6366F1', 'Rear Delts': '#8B5CF6', Calves: '#10B981'
  };

  const gymDays = data.gym_specific_days || [0,2,4];
  const dayNames = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
  const [activeDay, setActiveDay] = useState(gymDays[0] || 0);
  const muscleSchedule = data.muscle_schedule || {};

  const toggleMuscle = (muscle) => {
    const dayMuscles = muscleSchedule[activeDay] || [];
    const next = dayMuscles.includes(muscle)
      ? dayMuscles.filter(m => m !== muscle)
      : [...dayMuscles, muscle];
    onChange('muscle_schedule', { ...muscleSchedule, [activeDay]: next });
  };

  const suggestedSplits = [
    { name: 'Push/Pull/Legs', days: { 0: ['Chest','Shoulders','Triceps'], 1: ['Back','Biceps','Rear Delts'], 2: ['Legs','Calves','Abs'] } },
    { name: 'Upper/Lower', days: { 0: ['Chest','Back','Shoulders'], 1: ['Legs','Calves'], 2: ['Chest','Back','Arms'], 3: ['Legs','Abs'] } },
    { name: 'Full Body', days: { 0: ['Chest','Back','Legs','Shoulders'], 1: ['Chest','Back','Legs','Shoulders'], 2: ['Chest','Back','Legs','Shoulders'] } },
  ];

  const applySplit = (split) => {
    const schedule = {};
    gymDays.forEach((day, i) => {
      const splitDays = Object.values(split.days);
      schedule[day] = splitDays[i % splitDays.length];
    });
    onChange('muscle_schedule', schedule);
  };

  return (
    <div style={{ padding: '0 24px 32px', animation: 'slideInRight 0.4s ease both', position: 'relative' }}>
      <AnimatedBackground variant="gym" />
      <div style={{ position: 'relative', zIndex: 1 }}>
        <div style={{ marginBottom: 24 }}>
          <p style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', color: 'var(--purple)', marginBottom: 6, fontFamily: 'var(--font-mono)' }}>Step 4 of 6</p>
          <h2 style={{ fontFamily: 'var(--font-display)', fontSize: 36, fontWeight: 800, letterSpacing: '-0.01em', lineHeight: 1.1 }}>Muscle Split</h2>
          <p style={{ color: 'var(--text-secondary)', marginTop: 6, fontSize: 14 }}>Assign muscles to each training day</p>
        </div>

        {/* Quick-apply presets */}
        <div style={{ marginBottom: 20 }}>
          <label style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--text-tertiary)', display: 'block', marginBottom: 10 }}>Quick Presets</label>
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
            {suggestedSplits.map(s => (
              <button
                key={s.name}
                onClick={() => applySplit(s)}
                style={{
                  padding: '8px 14px', borderRadius: 20, fontSize: 12, fontWeight: 600,
                  border: '1.5px solid rgba(168,85,247,0.4)', background: 'rgba(168,85,247,0.1)',
                  color: 'var(--purple)', cursor: 'pointer', transition: 'all 0.2s',
                }}
              >
                <Icon name="bolt" size={10} color="var(--purple)" /> {s.name}
              </button>
            ))}
          </div>
        </div>

        {/* Day tabs */}
        <div style={{ marginBottom: 16 }}>
          <div style={{ display: 'flex', gap: 6, overflowX: 'auto', paddingBottom: 4 }}>
            {gymDays.map((day, i) => {
              const dayMuscles = muscleSchedule[day] || [];
              return (
                <button
                  key={day}
                  onClick={() => setActiveDay(day)}
                  style={{
                    flexShrink: 0,
                    padding: '8px 14px', borderRadius: 10, fontSize: 12, fontWeight: 600,
                    border: activeDay === day ? '1.5px solid var(--purple)' : '1.5px solid var(--border)',
                    background: activeDay === day ? 'rgba(168,85,247,0.15)' : 'var(--bg-tertiary)',
                    color: activeDay === day ? 'var(--purple)' : 'var(--text-secondary)',
                    cursor: 'pointer', transition: 'all 0.2s',
                    position: 'relative',
                  }}
                >
                  {dayNames[day]}
                  {dayMuscles.length > 0 && (
                    <span style={{
                      marginLeft: 5, display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                      width: 16, height: 16, borderRadius: '50%',
                      background: 'var(--purple)', color: '#fff', fontSize: 9, fontWeight: 700,
                    }}>{dayMuscles.length}</span>
                  )}
                </button>
              );
            })}
          </div>
        </div>

        {/* Muscle selector for active day */}
        <div style={{ marginBottom: 24 }}>
          <label style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--text-tertiary)', display: 'block', marginBottom: 10 }}>
            {dayNames[activeDay]} — Select Muscles
          </label>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
            {muscles.map(m => {
              const isSelected = (muscleSchedule[activeDay] || []).includes(m);
              const color = muscleColors[m];
              return (
                <button
                  key={m}
                  onClick={() => toggleMuscle(m)}
                  style={{
                    padding: '8px 14px', borderRadius: 20, fontSize: 13, fontWeight: 600,
                    border: isSelected ? `1.5px solid ${color}` : '1.5px solid var(--border)',
                    background: isSelected ? `${color}20` : 'var(--bg-tertiary)',
                    color: isSelected ? color : 'var(--text-secondary)',
                    cursor: 'pointer', transition: 'all 0.15s',
                    transform: isSelected ? 'scale(1.05)' : 'scale(1)',
                  }}
                >
                  {isSelected && <Icon name="check" size={10} color={color} style={{ marginRight: 4 }} />}
                  {m}
                </button>
              );
            })}
          </div>
        </div>

        {/* Summary */}
        {Object.keys(muscleSchedule).length > 0 && (
          <div style={{ marginBottom: 20, animation: 'fadeIn 0.3s ease' }}>
            <label style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--text-tertiary)', display: 'block', marginBottom: 8 }}>Plan Summary</label>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
              {gymDays.map(day => {
                const muscles = muscleSchedule[day] || [];
                if (!muscles.length) return null;
                return (
                  <div key={day} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '8px 12px', borderRadius: 10, background: 'var(--bg-tertiary)', border: '1px solid var(--border)' }}>
                    <span style={{ fontSize: 12, fontWeight: 700, color: 'var(--purple)', minWidth: 28 }}>{dayNames[day]}</span>
                    <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>
                      {muscles.map(m => (
                        <span key={m} style={{ fontSize: 11, padding: '2px 8px', borderRadius: 10, background: `${muscleColors[m]}20`, color: muscleColors[m], fontWeight: 600 }}>{m}</span>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        <Btn onClick={onNext} variant="primary">Continue</Btn>
        <button onClick={onBack} style={{ width: '100%', marginTop: 10, padding: 12, background: 'none', border: 'none', color: 'var(--text-tertiary)', fontSize: 14, cursor: 'pointer' }}>← Back</button>
      </div>
    </div>
  );
};

// ─── STEP 5: AI SPLIT ─────────────────────────────────────────────────────────
const StepAI = ({ data, onChange, onNext, onBack }) => {
  const [loading, setLoading] = useState(false);
  const [aiResult, setAiResult] = useState(null);
  const [selected, setSelected] = useState(null);

  const inactivityOptions = [
    { value: 'active', label: 'Currently Active', icon: '🔥', sub: 'Training regularly' },
    { value: '1_month', label: '1 Month Out', icon: '📅', sub: 'Short break' },
    { value: '3_months', label: '3 Months Out', icon: '⏸️', sub: 'Moderate deload' },
    { value: '6_months', label: '6 Months Out', icon: '📆', sub: 'Significant break' },
    { value: '1_year', label: '1+ Year Out', icon: '🕐', sub: 'Major restart' },
    { value: 'never', label: 'Never Trained', icon: '✨', sub: 'Starting fresh' },
  ];

  const triggerAI = async (val) => {
    setSelected(val);
    setLoading(true);
    setAiResult(null);
    // Simulate AI call
    await new Promise(r => setTimeout(r, 2200));
    const splits = {
      active: { name: 'PPL 6-Day Split', desc: 'Push · Pull · Legs × 2/week', detail: 'Advanced concurrent training for maximum volume and frequency.', icon: '⚡' },
      '1_month': { name: 'Upper/Lower Split', desc: '4 days/week', detail: 'Balanced approach returning from short break. Optimal for neuromuscular re-adaptation.', icon: '💪' },
      '3_months': { name: 'Full Body 3x', desc: '3 days/week', detail: 'Full body training builds back your foundation with compound movements.', icon: '🏋️' },
      '6_months': { name: 'Beginner Push/Pull', desc: '3 days/week', detail: 'Conservative restart. Focus on movement patterns before adding volume.', icon: '📈' },
      '1_year': { name: 'Novice Linear', desc: '3 days/week A/B', detail: 'Progressive overload protocol. Build back your baseline over 8–12 weeks.', icon: '🌱' },
      never: { name: 'Beginner Foundation', desc: '3 days/week', detail: 'Start with fundamental movements. Build the habit before the intensity.', icon: '🚀' },
    };
    setAiResult(splits[val]);
    onChange('inactivity', val);
    onChange('ai_split', splits[val]);
    setLoading(false);
  };

  return (
    <div style={{ padding: '0 24px 32px', animation: 'slideInRight 0.4s ease both', position: 'relative' }}>
      <AnimatedBackground variant="default" />
      <div style={{ position: 'relative', zIndex: 1 }}>
        <div style={{ marginBottom: 24 }}>
          <p style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', color: 'var(--blue)', marginBottom: 6, fontFamily: 'var(--font-mono)' }}>Step 5 of 6</p>
          <h2 style={{ fontFamily: 'var(--font-display)', fontSize: 36, fontWeight: 800, letterSpacing: '-0.01em', lineHeight: 1.1 }}>AI Split</h2>
          <p style={{ color: 'var(--text-secondary)', marginTop: 6, fontSize: 14 }}>How long have you been away from training?</p>
        </div>

        <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 24 }}>
          {inactivityOptions.map((opt, i) => (
            <button
              key={opt.value}
              onClick={() => triggerAI(opt.value)}
              style={{
                display: 'flex', alignItems: 'center', gap: 12, padding: '13px 16px', borderRadius: 12,
                border: selected === opt.value ? '1.5px solid var(--blue)' : '1.5px solid var(--border)',
                background: selected === opt.value ? 'rgba(59,130,255,0.12)' : 'var(--bg-tertiary)',
                cursor: 'pointer', transition: 'all 0.2s', textAlign: 'left',
                animation: `fadeUp 0.3s ease ${i * 0.05}s both`,
              }}
            >
              <span style={{ fontSize: 20, flexShrink: 0 }}>{opt.icon}</span>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 600, fontSize: 14, color: selected === opt.value ? 'var(--text-primary)' : 'var(--text-secondary)' }}>{opt.label}</div>
                <div style={{ fontSize: 12, color: 'var(--text-tertiary)', marginTop: 1 }}>{opt.sub}</div>
              </div>
              {selected === opt.value && !loading && <Icon name="check" size={16} color="var(--blue)" />}
              {selected === opt.value && loading && (
                <div style={{ width: 16, height: 16, borderRadius: '50%', border: '2px solid rgba(59,130,255,0.3)', borderTopColor: 'var(--blue)', animation: 'spin 0.6s linear infinite' }} />
              )}
            </button>
          ))}
        </div>

        {/* AI Result card */}
        {loading && (
          <div style={{
            padding: '20px', borderRadius: 14, background: 'var(--bg-tertiary)', border: '1px solid var(--border)',
            marginBottom: 24, animation: 'fadeIn 0.3s ease',
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 14 }}>
              <div style={{ width: 8, height: 8, borderRadius: '50%', background: 'var(--blue)', animation: 'pulse 1s infinite' }} />
              <div style={{ width: 8, height: 8, borderRadius: '50%', background: 'var(--blue)', animation: 'pulse 1s infinite 0.2s' }} />
              <div style={{ width: 8, height: 8, borderRadius: '50%', background: 'var(--blue)', animation: 'pulse 1s infinite 0.4s' }} />
              <span style={{ fontSize: 13, color: 'var(--text-secondary)', marginLeft: 4 }}>AI analyzing your profile...</span>
            </div>
            <div style={{ height: 12, borderRadius: 6, background: 'linear-gradient(90deg, var(--bg-secondary), var(--text-tertiary), var(--bg-secondary))', backgroundSize: '200% 100%', animation: 'shimmer 1.5s infinite', marginBottom: 8 }} />
            <div style={{ height: 12, borderRadius: 6, background: 'linear-gradient(90deg, var(--bg-secondary), var(--text-tertiary), var(--bg-secondary))', backgroundSize: '200% 100%', animation: 'shimmer 1.5s infinite 0.1s', width: '70%' }} />
          </div>
        )}

        {aiResult && !loading && (
          <div style={{
            padding: '20px', borderRadius: 14,
            background: 'linear-gradient(135deg, rgba(59,130,255,0.12), rgba(99,102,241,0.06))',
            border: '1.5px solid rgba(59,130,255,0.3)',
            marginBottom: 24, animation: 'scaleIn 0.4s ease',
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 12 }}>
              <div style={{ width: 36, height: 36, borderRadius: 10, background: 'rgba(59,130,255,0.2)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18 }}>{aiResult.icon}</div>
              <div>
                <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--blue)', fontFamily: 'var(--font-mono)' }}>AI Recommendation</div>
                <div style={{ fontFamily: 'var(--font-display)', fontSize: 20, fontWeight: 700, letterSpacing: '-0.01em' }}>{aiResult.name}</div>
              </div>

    available_equipment: null,
    injuries: '',
    muscle_schedule: {},
    inactivity: null,
    ai_split: null,
  });

  const updateField = useCallback((field, val) => {
    setFormData(prev => ({ ...prev, [field]: val }));
  }, []);

  const goNext = () => {
    setDirection('forward');
    setStepIdx(i => Math.min(i + 1, STEPS.length - 1));
  };
  const goBack = () => {
    setDirection('back');
    setStepIdx(i => Math.max(i - 1, 0));
  };

  const currentStep = STEPS[stepIdx];
  const showProgress = stepIdx >= 1 && stepIdx <= 6;
  const totalSteps = 6;
  const progressStep = stepIdx;

  return (
    <div style={{
      width: '100%', height: '100%', display: 'flex', justifyContent: 'center', alignItems: 'flex-start',
      background: 'var(--bg-primary)',
      paddingTop: 0,
    }}>
      <div style={{
        width: '100%', maxWidth: 420, height: '100%', minHeight: '100vh',
        background: 'var(--bg-primary)', position: 'relative', display: 'flex', flexDirection: 'column',
        overflowY: 'auto', overflowX: 'hidden',
      }}>
        {/* Progress header */}
        {showProgress && (
          <div style={{
            position: 'sticky', top: 0, zIndex: 10,
            background: 'rgba(7,7,15,0.95)', backdropFilter: 'blur(20px)',
            padding: '16px 24px 12px',
            borderBottom: '1px solid var(--separator)',
          }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
              <button onClick={goBack} style={{ width: 36, height: 36, borderRadius: 10, border: '1px solid var(--border)', background: 'var(--bg-tertiary)', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }}>
                <Icon name="arrowLeft" size={16} color="var(--text-secondary)" />
              </button>
              <div style={{ fontFamily: 'var(--font-mono)', fontSize: 12, color: 'var(--text-tertiary)', fontWeight: 500 }}>
                {progressStep}/{totalSteps}
              </div>
              <div style={{ width: 36 }} />
            </div>
            <ProgressBar current={progressStep} total={totalSteps} />
          </div>
        )}

        {/* Steps */}
        <div style={{ flex: 1, paddingTop: showProgress ? 0 : 0 }}>
          {currentStep === 'splash' && <StepSplash onNext={goNext} />}
          {currentStep === 'about' && <StepAbout data={formData} onChange={updateField} onNext={goNext} onBack={goBack} />}
          {currentStep === 'goals' && <StepGoals data={formData} onChange={updateField} onNext={goNext} onBack={goBack} />}
          {currentStep === 'gym' && <StepGym data={formData} onChange={updateField} onNext={goNext} onBack={goBack} />}
          {currentStep === 'muscles' && <StepMuscles data={formData} onChange={updateField} onNext={goNext} onBack={goBack} />}
          {currentStep === 'ai' && <StepAI data={formData} onChange={updateField} onNext={goNext} onBack={goBack} />}
          {currentStep === 'summary' && <StepSummary data={formData} onSubmit={goNext} onBack={goBack} />}
          {currentStep === 'pledge' && <TruthPledge userName={formData.first_name || 'Athlete'} onConfirm={goNext} />}
          {currentStep === 'dashboard' && <DashboardPreview data={formData} />}
        </div>
      </div>
    </div>
  );
}

// Add spin keyframe
const styleEl = document.createElement('style');
styleEl.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
document.head.appendChild(styleEl);

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
