name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies (pinned lock + dev tools)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install -r requirements-dev.txt

      - name: Lint (ruff, error-only gate)
        run: python -m ruff check --select=E9,F63,F7,F82 backend bot.py main.py tests alembic

      - name: Byte-compile
        run: |
          python -m py_compile main.py bot.py $(find backend -name '*.py' -not -path '*__pycache__*')

      - name: Run tests
        run: python -m pytest -q

      - name: Migrations apply cleanly + no ORM drift
        env:
          DATABASE_URL: sqlite:///./ci.db
        run: |
          python -m alembic upgrade head
          python -m alembic check
          python -m alembic downgrade base
