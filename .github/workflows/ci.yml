name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies (pinned lock + dev tools)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install -r requirements-dev.txt

      - name: Lint (ruff, error-only gate)
        run: python -m ruff check --select=E9,F63,F7,F82 backend bot.py main.py tests alembic

      - name: Byte-compile
        run: |
          python -m py_compile main.py bot.py $(find backend -name '*.py' -not -path '*__pycache__*')

      - name: Run tests
        run: python -m pytest tests/ -q

      - name: Migrations apply cleanly + no ORM drift
        env:
          DATABASE_URL: sqlite:///./ci.db
        run: |
          python -m alembic upgrade head
          python -m alembic check
          python -m alembic downgrade base

  # Proves migrations + ORM are Postgres-compatible before the production SQLite->Postgres
  # cutover (ARCHITECTURE_REVIEW #2). Catches SQLite-only DDL that the sqlite job can't.
  migrations-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: health_transform
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies (pinned lock)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock

      - name: Migrations apply + no ORM drift on Postgres
        env:
          DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/health_transform
        run: |
          python -m alembic upgrade head
          python -m alembic check
          python -m alembic downgrade base

  # Browser E2E: the app boots in a plain browser, account auth works, primary nav renders.
  # Guards the web-open flow (Phase C). Separate job so the unit suite never needs a browser.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies + Chromium
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install -r requirements-dev.txt
          python -m playwright install --with-deps chromium

      - name: Run browser E2E
        run: python -m pytest e2e/ -q
